<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Image Rotate</title>

<style>

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
position:relative;
width:220px;
height:300px;
transform-style:preserve-3d;
animation:rotate 20s linear infinite;
}

.container span{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
transform-origin:center;
transform-style:preserve-3d;
transform:rotateY(calc(var(--i)*51deg)) translateZ(400px);
}

.container span img{
width:100%;
height:100%;
object-fit:cover;
border-radius:10px;
border:4px solid white;
box-shadow:0 0 25px white;

-webkit-box-reflect: below 10px linear-gradient(transparent,rgba(0,0,0,0.5));
}

@keyframes rotate{

0%{
transform:perspective(1000px) rotateY(0deg);
}

100%{
transform:perspective(1000px) rotateY(360deg);
}

}

</style>
</head>

<body>

<div class="container">

<span style="--i:0"><img src="img1.jpg"></span>
<span style="--i:1"><img src="img2.jpg"></span>
<span style="--i:2"><img src="img3.jpg"></span>
<span style="--i:3"><img src="img4.jpg"></span>
<span style="--i:4"><img src="img5.jpg"></span>
<span style="--i:5"><img src="img6.jpg"></span>
<span style="--i:6"><img src="img7.jpg"></span>

</div>

</body>
</html>
